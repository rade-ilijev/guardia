<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Guardia">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#12343A"/>
      <stop offset="55%" stop-color="#0A1417"/>
      <stop offset="100%" stop-color="#04080A"/>
    </radialGradient>
    <radialGradient id="aura" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#18E6C8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#18E6C8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gmark" x1="188" y1="148" x2="340" y2="368" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="38%" stop-color="#D8FFF8"/>
      <stop offset="100%" stop-color="#18C9E0"/>
    </linearGradient>
    <linearGradient id="shieldMini" x1="0" y1="-18" x2="0" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="55%" stop-color="#54FBE0"/>
      <stop offset="100%" stop-color="#0A8C9E"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <!-- Ambient glow only — no shield plate behind the mark -->
  <circle cx="256" cy="262" r="168" fill="url(#aura)"/>

  <g filter="url(#glow)">
    <!-- Hero G: luminous white → cyan, reads as lens / watchful eye -->
    <g fill="none" stroke-linecap="round">
      <path d="M350,214 A98,98 0 1 0 350,310" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="54"/>
      <path d="M304,262 L360,262" stroke="#FFFFFF" stroke-opacity="0.14" stroke-width="54"/>
      <path d="M350,214 A98,98 0 1 0 350,310" stroke="url(#gmark)" stroke-width="38"/>
      <path d="M304,262 L360,262" stroke="url(#gmark)" stroke-width="38"/>
    </g>

    <!-- Shield lives *inside* the G — the protected core (replaces the old white dot) -->
    <g transform="translate(228 236) scale(1.35)">
      <path d="M0,-20 C9,-20 16,-17 20,-13 C22,-9 22,-4 22,2 C22,14 11,24 0,30 C-11,24 -22,14 -22,2 C-22,-4 -22,-9 -20,-13 C-16,-17 -9,-20 0,-20 Z"
            fill="url(#shieldMini)"/>
      <path d="M0,-20 C9,-20 16,-17 20,-13 C22,-9 22,-4 22,2 C22,14 11,24 0,30 C-11,24 -22,14 -22,2 C-22,-4 -22,-9 -20,-13 C-16,-17 -9,-20 0,-20 Z"
            fill="none" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="2.2"/>
    </g>

    <!-- Single bright spark on the open terminal (scan / recognition node) -->
    <circle cx="350" cy="214" r="7.5" fill="#FFFFFF"/>
    <circle cx="350" cy="214" r="14" fill="#54FBE0" fill-opacity="0.35" filter="url(#soft)"/>
  </g>
</svg>
